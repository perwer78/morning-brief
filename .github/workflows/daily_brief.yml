name: Morning Brief — Daily Report

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Morning Brief
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python tools/generate_report.py

      - name: Commit and push report
        run: |
          git config user.name "morning-brief-bot"
          git config user.email "bot@morning-brief"
          git add docs/reports/
          git diff --staged --quiet || git commit -m "report: $(date -u +%Y-%m-%d) Morning Brief"
          git push
